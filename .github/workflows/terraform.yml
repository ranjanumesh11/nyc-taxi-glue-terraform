name: Terraform

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: Plan & Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Select TFC workspace based on target branch.
      # TF_WORKSPACE env var tells TFC which tagged workspace to use.
      # Both workspaces must have the tag "nyc-taxi-glue" set in TFC UI.
      - name: Select TFC workspace
        run: |
          TARGET="${{ github.base_ref || github.ref_name }}"
          if [ "$TARGET" = "main" ]; then
            echo "TF_WORKSPACE=nyc-taxi-glue-prod" >> $GITHUB_ENV
            echo "ENV_NAME=prod" >> $GITHUB_ENV
          else
            echo "TF_WORKSPACE=nyc-taxi-glue-dev" >> $GITHUB_ENV
            echo "ENV_NAME=dev" >> $GITHUB_ENV
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TFC_API_TOKEN }}

      # Run from repo root so the entire repo (including modules/) is uploaded to TFC.
      # TFC agent resolves ./modules/glue_job relative to repo root correctly.
      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan (${{ env.ENV_NAME }})
        run: terraform plan -no-color

      - name: Terraform Apply (${{ env.ENV_NAME }})
        if: github.event_name == 'push'
        run: terraform apply -auto-approve

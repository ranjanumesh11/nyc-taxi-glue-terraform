name: Terraform

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: Plan & Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Resolve which environment folder to run based on the target branch.
      # PR to dev  → environments/dev/   (plan only)
      # Push to dev → environments/dev/  (plan + apply)
      # PR to main  → environments/prod/ (plan only)
      # Push to main → environments/prod/ (plan + apply)
      - name: Resolve environment directory
        id: env
        run: |
          TARGET="${{ github.base_ref || github.ref_name }}"
          if [ "$TARGET" = "main" ]; then
            echo "dir=environments/prod" >> $GITHUB_OUTPUT
            echo "name=prod" >> $GITHUB_OUTPUT
          else
            echo "dir=environments/dev" >> $GITHUB_OUTPUT
            echo "name=dev" >> $GITHUB_OUTPUT
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TFC_API_TOKEN }}

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ steps.env.outputs.dir }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: ${{ steps.env.outputs.dir }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ steps.env.outputs.dir }}

      - name: Terraform Plan (${{ steps.env.outputs.name }})
        run: terraform plan -no-color
        working-directory: ${{ steps.env.outputs.dir }}

      - name: Terraform Apply (${{ steps.env.outputs.name }})
        if: github.event_name == 'push'
        run: terraform apply -auto-approve
        working-directory: ${{ steps.env.outputs.dir }}
